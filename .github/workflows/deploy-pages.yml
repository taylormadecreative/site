name: Deploy to GitHub Pages

# Static deploy via GitHub Actions instead of the legacy Jekyll builder.
# The legacy builder 0-duration-fails when a CNAME file is present on this repo;
# this workflow deploys the static files directly and honors the CNAME custom domain.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# never cancel an in-progress deploy; let each finish so the live site is consistent
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
